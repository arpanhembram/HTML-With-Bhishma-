function showfourth(){ 
  document.getElementById("output").innerHTML = `
<h2>💪 Practice Zone - 45 Questions</h2>

<div style="background:#1e1e1e; color:#4fc3f7; padding:20px; border-radius:10px; font-family: 'Courier New', monospace; font-size:15px; border-left:5px solid red; margin-bottom:20px;">
<pre>&lt;!DOCTYPE html&gt;
&lt;html&gt;
  &lt;head&gt;&lt;title&gt;My Page&lt;/title&gt;&lt;/head&gt;

&lt;/html&gt;</pre>
</div>

<h3 style="color:#d81b60;">📘 SECTION A: 35 Basic Tag Questions</h3>
<div id="basic-questions"></div>

<h3 style="color:#d81b60; margin-top:30px;">🚀 SECTION B: 10 Advanced Tag Questions</h3>
<div id="advance-questions"></div>
`;

  const basicQ = [
    "Display 'Hello World' as Heading", "Make 3 paragraphs about yourself", "Make a link to google.com in new tab",
    "Insert image logo.png with alt='Logo'", "Create a button with text 'Submit'", "Make unordered list of 5 fruits",
    "Make ordered list of your subjects", "Break line between Line1 and Line2", "Make word 'Important' bold",
    "Make word 'Italic' in italics", "Create input box for name", "Create password input field",
    "Add placeholder 'Enter email'", "Make horizontal line using <hr>", "Create div with red background",
    "Write comment in HTML", "Make text center aligned", "Create link to send email",
    "Add 2 line breaks between sentences", "Make title of page using <title>", "Insert favicon code",
    "Create box with border using div", "Make 3 images in one row", "Link one HTML page to another",
    "Create dropdown with 3 options", "Make checkbox for Agree to terms", "Create radio buttons for Gender",
    "Add title attribute to link", "Make text underlined", "Create span inside paragraph",
    "Add yellow background to paragraph", "Make font size 20px using style", "Create marquee text",
    "Embed YouTube video using iframe", "Make copyright symbol © in footer"
  ];

  const advanceQ = [
    "Layout with <header> <nav> <section> <footer>", "Embed audio player with controls",
    "Create video player with poster image", "Make table with 3 rows and 3 columns",
    "Embed Google Maps using iframe", "Create form with email validation",
    "Make navigation bar with 4 links", "Use <article> for blog post",
    "Semantic layout with <main> and <aside>", "Form with required fields and submit"
  ];

  function makeQuestion(q, num, color){
    return `
    <div style="background:white; padding:15px; margin:12px 0; border-radius:10px; border-left:5px solid ${color}; box-shadow:0 2px 5px rgba(0,0,0,0.1);">
      <p style="font-size:17px;"><b style="color:red;">Q${num}.</b> ${q}</p>
      
      <label style="font-weight:bold;">Write Your Code Here:</label>
      <textarea id="code${num}" rows="4" style="width:98%; margin-top:5px; font-family:'Courier New'; font-size:14px; padding:8px; border:2px solid #ccc; border-radius:6px;" placeholder="Type HTML code here..."></textarea>
      
      <button onclick="runCode(${num})" style="background:${color}; color:white; border:none; padding:8px 15px; border-radius:6px; margin-top:8px; cursor:pointer; font-weight:bold;">▶ Run Code</button>
      
      <div id="result${num}" style="background:#f1f1f1; padding:10px; margin-top:10px; border-radius:6px; min-height:50px; border:1px dashed #999;">
        <b>Output will appear here</b>
      </div>
    </div>
    `;
  }

  let basicHTML = "";
  basicQ.forEach((q, i) => { basicHTML += makeQuestion(q, i+1, "#2196f3"); });

  let advanceHTML = "";
  advanceQ.forEach((q, i) => { advanceHTML += makeQuestion(q, i+36, "#e91e63"); });

  document.getElementById("basic-questions").innerHTML = basicHTML;
  document.getElementById("advance-questions").innerHTML = advanceHTML;
  
  let out = document.getElementById("output");
  out.style.color = "red";
  out.style.background = "#fce4ec";
  out.style.padding = "25px";
  out.style.borderRadius = "12px";
  out.style.marginTop = "20px";
}

// This function runs the code students type
function runCode(num){
  let code = document.getElementById("code" + num).value;
  document.getElementById("result" + num).innerHTML = code;
}

`;

  let out = document.getElementById("output");

function showsecound(){

<h2>📚 10 Most Important Basic HTML Tags</h2>
<p>Learn these 10 and you can make any basic website:</p>

<h3>1. &lt;h1&gt; to &lt;h6&gt; - Headings</h3>
<p>Used for titles. h1 is biggest, h6 is smallest</p>
<code>&lt;h1&gt;Main Title&lt;/h1&gt;</code>

<h3>2. &lt;p&gt; - Paragraph</h3>
<p>Used for writing normal text and paragraphs</p>
<code>&lt;p&gt;This is a paragraph&lt;/p&gt;</code>

<h3>3. &lt;a&gt; - Anchor/Link</h3>
<p>Used to link to other websites or pages</p>
<code>&lt;a href="https://google.com"&gt;Go to Google&lt;/a&gt;</code>

<h3>4. &lt;img&gt; - Image</h3>
<p>Used to display images on website</p>
<code>&lt;img src="photo.jpg" alt="Description"&gt;</code>

<h3>5. &lt;div&gt; - Division/Container</h3>
<p>Used to group elements together. Like a box</p>
<code>&lt;div&gt;All content inside&lt;/div&gt;</code>

<h3>6. &lt;button&gt; - Button</h3>
<p>Used to make clickable buttons</p>
<code>&lt;button&gt;Click Me&lt;/button&gt;</code>

<h3>7. &lt;ul&gt; &lt;li&gt; - List</h3>
<p>Used to make bullet point lists</p>
<code>&lt;ul&gt;&lt;li&gt;Item 1&lt;/li&gt;&lt;li&gt;Item 2&lt;/li&gt;&lt;/ul&gt;</code>

<h3>8. &lt;br&gt; - Line Break</h3>
<p>Used to break line. No closing tag needed</p>
<code>Line 1 &lt;br&gt; Line 2</code>

<h3>9. &lt;strong&gt; - Bold Text</h3>
<p>Used to make text bold and important</p>
